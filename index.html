<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey Cost Calculator | UK Live Fuel Prices</title>
    <meta name="description" content="Calculate your journey fuel cost with live UK petrol(E10) and diesel prices. Supports Miles per Gallon (MPG) and Pence per Litre.">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --petrol(E10): #f59e0b;
            --diesel: #8b5cf6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
        }

        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; font-weight: 600; }
        .input-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.875rem; color: var(--muted); margin-bottom: 0.5rem; font-weight: 500; }
        .input-row { display: flex; gap: 0.5rem; }

        input[type="number"] {
            flex: 1; background-color: var(--bg); border: 1px solid var(--border);
            border-radius: 0.75rem; padding: 0.75rem 1rem; color: var(--text);
            font-size: 1rem; outline: none; transition: border-color 0.2s;
        }
        input[type="number"]:focus { border-color: var(--accent); }

        .btn-group { display: flex; gap: 0.5rem; width: 100%; }

        .toggle-btn {
            flex: 1; background-color: var(--bg); border: 1px solid var(--border);
            border-radius: 0.75rem; color: var(--muted); padding: 0.75rem;
            font-size: 0.875rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s; text-align: center;
        }
        .toggle-btn:hover { border-color: var(--accent); color: var(--text); }
        .toggle-btn.active { border-color: var(--accent); background-color: var(--accent); color: white; }
        
        .toggle-btn.active.petrol(E10) { background-color: var(--petrol(E10)); border-color: var(--petrol(E10)); }
        .toggle-btn.active.diesel { background-color: var(--diesel); border-color: var(--diesel); }

        .switch-container {
            display: flex; align-items: center; justify-content: space-between;
            background-color: var(--bg); border: 1px solid var(--border);
            border-radius: 0.75rem; padding: 0.5rem 1rem; cursor: pointer;
            margin-bottom: 1.25rem; transition: border-color 0.2s;
        }
        .switch-container:hover { border-color: var(--accent); }
        .switch-label { font-size: 1rem; font-weight: 500; }
        .switch-track { width: 44px; height: 24px; background-color: var(--border); border-radius: 12px; position: relative; transition: background-color 0.2s; }
        .switch-track.active { background-color: var(--accent); }
        .switch-thumb { width: 20px; height: 20px; background-color: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: transform 0.2s; }
        .switch-track.active .switch-thumb { transform: translateX(20px); }

        .results { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
        .result-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .result-label { color: var(--muted); font-size: 1rem; }
        .result-value { font-size: 1.25rem; font-weight: 600; }
        .result-value.highlight { color: var(--success); font-size: 1.5rem; }
        .hidden { display: none; }

        .live-prices-badge {
            text-align: center; font-size: 0.75rem; color: var(--muted);
            margin-bottom: 1rem; padding: 0.5rem; border-radius: 0.5rem;
            background-color: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Journey Cost Calculator 🇬🇧</h1>
        
        <div class="live-prices-badge hidden" id="liveBadge">
            Live UK prices updated: <span id="liveDate">-</span>
        </div>

        <!-- Fuel Type -->
        <div class="input-group">
            <label>Fuel Type</label>
            <div class="btn-group">
                <button class="toggle-btn petrol(E10) active" id="petrol(E10)Btn" onclick="setFuelType('petrol(E10)(E10)')">petrol(E10)</button>
                <button class="toggle-btn diesel" id="dieselBtn" onclick="setFuelType('diesel')">Diesel</button>
            </div>
        </div>

        <!-- Distance -->
        <div class="input-group">
            <label>Distance</label>
            <div class="input-row">
                <input type="number" id="distance" placeholder="e.g. 150" min="0" step="any">
                <button class="toggle-btn active" id="distUnitBtn" onclick="toggleDistanceUnit()">Miles</button>
            </div>
        </div>

        <!-- Fuel Price -->
        <div class="input-group">
            <label>Fuel Price</label>
            <div class="input-row">
                <input type="number" id="fuelPrice" placeholder="e.g. 1.49" min="0" step="0.001">
                <button class="toggle-btn active" id="priceUnitBtn" onclick="togglePriceUnit()">/ Litre</button>
            </div>
        </div>

        <!-- Fuel Consumption -->
        <div class="input-group">
            <label>Fuel Consumption</label>
            <div class="input-row">
                <input type="number" id="fuelConsumption" placeholder="e.g. 35" min="0" step="any">
                <button class="toggle-btn active" id="consumpUnitBtn" onclick="toggleConsumptionUnit()">MPG</button>
            </div>
        </div>

        <!-- Return Trip Toggle -->
        <div class="switch-container" onclick="toggleReturn()">
            <span class="switch-label">Return Trip</span>
            <div class="switch-track" id="returnSwitch">
                <div class="switch-thumb"></div>
            </div>
        </div>

        <!-- Results -->
        <div class="results">
            <div class="result-row">
                <span class="result-label">Single Trip</span>
                <span class="result-value" id="singleCost">£0.00</span>
            </div>
            <div class="result-row hidden" id="returnRow">
                <span class="result-label">Return Trip</span>
                <span class="result-value highlight" id="returnCost">£0.00</span>
            </div>
        </div>
    </div>

   <script>
        // State variables
        let isMiles = true;
        let isPerLitre = true; // Default UK
        let isMPG = true;      // Default UK
        let isReturn = false;
        let currentFuelType = 'petrol(E10)';
        let livePrices = null;

        // UK Specific Constants
        // 1 UK (Imperial) Gallon = 4.54609 Litres
        const LITRES_PER_UK_GALLON = 4.54609;
        const MILES_PER_KM = 0.621371;

        // DOM Elements
        const distanceInput = document.getElementById('distance');
        const fuelPriceInput = document.getElementById('fuelPrice');
        const fuelConsumptionInput = document.getElementById('fuelConsumption');
        
        const distUnitBtn = document.getElementById('distUnitBtn');
        const priceUnitBtn = document.getElementById('priceUnitBtn');
        const consumpUnitBtn = document.getElementById('consumpUnitBtn');
        
        const returnSwitch = document.getElementById('returnSwitch');
        const returnRow = document.getElementById('returnRow');
        
        const singleCostEl = document.getElementById('singleCost');
        const returnCostEl = document.getElementById('returnCost');

        // Event listeners for live calculation
        distanceInput.addEventListener('input', calculate);
        fuelPriceInput.addEventListener('input', calculate);
        fuelConsumptionInput.addEventListener('input', calculate);

        // Fetch Live Prices on load from our clean JSON file
        window.onload = () => {
            fetch('./prices.json')
                .then(res => res.json())
                .then(data => {
                    livePrices = data;
                    
                    // Show the live date badge from your json
                    const liveBadge = document.getElementById('liveBadge');
                    const liveDate = document.getElementById('liveDate');
                    if (liveBadge) liveBadge.classList.remove('hidden');
                    if (liveDate) liveDate.innerText = data.last_updated;
                    
                    updateLivePrice();
                })
                .catch(err => console.log("Live prices not available, using manual input.", err));
        };

        function setFuelType(type) {
            currentFuelType = type;
            
            // Grab the button elements safely
            const petrolBtn = document.getElementById('petrol(E10)Btn');
            const dieselBtn = document.getElementById('dieselBtn');
            
            // Clean up the color toggles: if type contains 'petrol', light up petrol, otherwise diesel
            if (petrolBtn && dieselBtn) {
                if (type.includes('petrol')) {
                    petrolBtn.classList.add('active');
                    dieselBtn.classList.remove('active');
                } else {
                    dieselBtn.classList.add('active');
                    petrolBtn.classList.remove('active');
                }
            }
            
            updateLivePrice();
            calculate();
        }

        function updateLivePrice() {
            if (livePrices) {
                if (!isPerLitre) togglePriceUnit(); // Ensure we are on /Litre to apply live price
                
                // Flexible check: if the fuel type has 'petrol' in its name, use petrol price, else diesel
                if (currentFuelType.includes('petrol')) {
                    fuelPriceInput.value = livePrices.petrol_per_litre;
                } else {
                    fuelPriceInput.value = livePrices.diesel_per_litre;
                }
            }
        }

        function toggleDistanceUnit() {
            isMiles = !isMiles;
            distUnitBtn.innerText = isMiles ? 'Miles' : 'KM';
            distUnitBtn.classList.toggle('active');
            updateConsumptionLabel();
            calculate();
        }

        function togglePriceUnit() {
            isPerLitre = !isPerLitre;
            priceUnitBtn.innerText = isPerLitre ? '/ Litre' : '/ Gallon';
            priceUnitBtn.classList.toggle('active');
            calculate();
        }

        function toggleConsumptionUnit() {
            isMPG = !isMPG;
            updateConsumptionLabel();
            consumpUnitBtn.classList.toggle('active');
            calculate();
        }

        function updateConsumptionLabel() {
            if (isMPG) {
                consumpUnitBtn.innerText = 'MPG';
                fuelConsumptionInput.placeholder = 'e.g. 35';
            } else {
                consumpUnitBtn.innerText = 'L/100km';
                fuelConsumptionInput.placeholder = 'e.g. 8';
            }
        }

        function toggleReturn() {
            isReturn = !isReturn;
            returnSwitch.classList.toggle('active');
            returnRow.classList.toggle('hidden');
            calculate();
        }

        function calculate() {
            const distance = parseFloat(distanceInput.value) || 0;
            const price = parseFloat(fuelPriceInput.value) || 0;
            const consumption = parseFloat(fuelConsumptionInput.value) || 0;

            if (distance <= 0 || price <= 0 || consumption <= 0) {
                singleCostEl.innerText = '£0.00';
                returnCostEl.innerText = '£0.00';
                return;
            }

            // Step 1: Convert distance to Miles
            const distanceMiles = isMiles ? distance : distance * MILES_PER_KM;

            // Step 2: Calculate UK Gallons needed
            let ukGallonsNeeded = 0;
            if (isMPG) {
                ukGallonsNeeded = distanceMiles / consumption;
            } else {
                // User entered L/100km. Convert distance to KM to find total Litres, then UK Gallons
                const distanceKm = isMiles ? distance / MILES_PER_KM : distance;
                const litresNeeded = (consumption / 100) * distanceKm;
                ukGallonsNeeded = litresNeeded / LITRES_PER_UK_GALLON;
            }

            // Step 3: Calculate Price per UK Gallon
            let pricePerGallon = price;
            if (isPerLitre) {
                // Convert £/L to £/Gallon
                pricePerGallon = price * LITRES_PER_UK_GALLON;
            }

            // Step 4: Final Cost
            const singleTripCost = ukGallonsNeeded * pricePerGallon;
            const returnTripCost = singleTripCost * 2;

            // Update UI
            singleCostEl.innerText = `£${singleTripCost.toFixed(2)}`;
            returnCostEl.innerText = `£${returnTripCost.toFixed(2)}`;
        }
    </script>
</body>
</html>
